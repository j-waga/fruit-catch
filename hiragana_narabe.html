<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ひらがなならべ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #e8f4ff 0%, #d0e8ff 100%);
  min-height: 100vh;
  font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', sans-serif;
  touch-action: manipulation;
  user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
}
h1 { font-size: 26px; color: #2980b9; margin: 16px 0 4px; }
#question-area {
  background: white;
  border-radius: 20px;
  padding: 16px 24px;
  margin: 10px 16px;
  width: calc(100% - 32px);
  max-width: 420px;
  text-align: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
}
#hint-emoji { font-size: 64px; margin-bottom: 6px; }
#hint-text { font-size: 16px; color: #888; margin-bottom: 8px; }
#answer-slots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
  min-height: 56px;
}
.slot {
  width: 52px; height: 52px;
  border-radius: 12px;
  border: 2.5px dashed #aad4f5;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: bold; color: #2980b9;
  background: #f0f8ff;
  cursor: pointer;
  transition: all 0.15s;
}
.slot.filled { border-style: solid; border-color: #2980b9; background: #ddeeff; }
.slot:active { transform: scale(0.92); }
#choices-area {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  padding: 12px 16px;
  max-width: 420px;
  width: 100%;
}
.choice-btn {
  width: 64px; height: 64px;
  border-radius: 16px;
  border: 3px solid #5dade2;
  background: white;
  font-size: 30px;
  font-weight: bold;
  color: #1a6fa0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 8px rgba(0,0,0,0.12);
  transition: all 0.1s;
}
.choice-btn:active { transform: scale(0.88); background: #ddeeff; }
.choice-btn.used { opacity: 0.3; pointer-events: none; }
#feedback {
  font-size: 28px; font-weight: bold;
  height: 40px; text-align: center;
  transition: all 0.2s;
}
#stats-bar {
  display: flex;
  gap: 12px;
  font-size: 15px;
  font-weight: bold;
  color: #2980b9;
  margin: 6px 0;
  flex-wrap: wrap;
  justify-content: center;
  padding: 0 12px;
}
#stats-bar span {
  background: white;
  border-radius: 12px;
  padding: 6px 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
.correct-anim { animation: correct-flash 0.5s ease; }
@keyframes correct-flash {
  0%,100% { background: white; }
  50% { background: #aef5d0; }
}

/* ===== Xフォローバナー ===== */
#x-banner {
  position: fixed;
  bottom: 18px; right: 18px;
  z-index: 99999;
  background: #000; color: #fff;
  border-radius: 999px;
  padding: 10px 16px 10px 10px;
  font-family: 'Hiragino Maru Gothic Pro', 'BIZ UDPGothic', sans-serif;
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
  box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s, box-shadow 0.15s;
  max-width: 240px;
  user-select: none;
  animation: xSlideUp 0.5s cubic-bezier(.22,1,.36,1) 1.5s both;
}
#x-banner:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
@keyframes xSlideUp {
  from { transform: translateY(80px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.x-smiley {
  width: 40px; height: 40px; flex-shrink: 0;
  border-radius: 50%; background: #FFD700;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; line-height: 1;
}
.x-text-block { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.x-handle {
  font-weight: 700; font-size: 13px;
  display: flex; align-items: center; gap: 5px; color: #fff;
}
.x-handle svg { width: 13px; height: 13px; fill: #fff; flex-shrink: 0; }
.x-msg { font-size: 11px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ===== 花火キャンバス ===== */
#fireworks-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9000;
}
</style>
</head>
<body>

<h1>🔤 ひらがなならべ</h1>
<div id="stats-bar">
  <span>⭐ <span id="score">0</span>てん</span>
  <span>🎯 <span id="q-num">1</span>もんめ</span>
  <span>🔥 <span id="streak">0</span>れんぞく</span>
</div>

<div id="question-area">
  <div id="hint-emoji">🐱</div>
  <div id="hint-text">なんていう？</div>
  <div id="answer-slots"></div>
  <div id="feedback" style="margin-top:8px;"></div>
</div>

<div id="choices-area"></div>

<!-- 花火キャンバス -->
<canvas id="fireworks-canvas"></canvas>

<!-- Xフォローバナー -->
<a id="x-banner" href="https://x.com/rabojasu" target="_blank" rel="noopener noreferrer">
  <span class="x-smiley">😊</span>
  <span class="x-text-block">
    <span class="x-handle">
      <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      @rabojasu
    </span>
    <span class="x-msg">いいね！協力いただけると嬉しいです😊</span>
  </span>
</a>

<script>
const WORDS = [
  {emoji:'🐱',word:'ねこ',hint:'ニャーとなく'},
  {emoji:'🐶',word:'いぬ',hint:'ワンとなく'},
  {emoji:'🐸',word:'かえる',hint:'ケロケロなく'},
  {emoji:'🐟',word:'さかな',hint:'みずのなか'},
  {emoji:'🍎',word:'りんご',hint:'あかいくだもの'},
  {emoji:'🍌',word:'ばなな',hint:'きいろいくだもの'},
  {emoji:'☀️',word:'たいよう',hint:'あかるくひかる'},
  {emoji:'🌙',word:'つき',hint:'よるにでる'},
  {emoji:'⭐',word:'ほし',hint:'きらきらひかる'},
  {emoji:'🌸',word:'はな',hint:'きれいにさく'},
  {emoji:'🚂',word:'でんしゃ',hint:'はやくはしる'},
  {emoji:'🚗',word:'くるま',hint:'どうろをはしる'},
  {emoji:'✈️',word:'ひこうき',hint:'そらをとぶ'},
  {emoji:'🏠',word:'いえ',hint:'すむところ'},
  {emoji:'🍙',word:'おにぎり',hint:'ごはんでつくる'},
  {emoji:'🎈',word:'ふうせん',hint:'ふわふわとぶ'},
];

let score = 0, qNum = 0, streak = 0;
let currentWord = '', userInput = [], usedChoices = [];
let shuffledChoices = [];

function shuffle(arr) {
  const a = [...arr];
  for(let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function nextQuestion() {
  qNum++;
  document.getElementById('q-num').textContent = qNum;
  document.getElementById('feedback').textContent = '';
  userInput = []; usedChoices = [];

  const q = WORDS[Math.floor(Math.random() * WORDS.length)];
  currentWord = q.word;
  document.getElementById('hint-emoji').textContent = q.emoji;
  document.getElementById('hint-text').textContent = q.hint;

  const correctChars = currentWord.split('');
  const allHira = 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん';
  const distractors = shuffle([...allHira].filter(c => !correctChars.includes(c))).slice(0, Math.max(0, 6 - correctChars.length));
  shuffledChoices = shuffle([...correctChars, ...distractors]);

  renderSlots();
  renderChoices();
}

function renderSlots() {
  const area = document.getElementById('answer-slots');
  area.innerHTML = '';
  for(let i = 0; i < currentWord.length; i++) {
    const slot = document.createElement('div');
    slot.className = 'slot' + (userInput[i] ? ' filled' : '');
    slot.textContent = userInput[i] || '';
    slot.dataset.idx = i;
    if(userInput[i]) {
      slot.addEventListener('touchstart', (e) => { e.preventDefault(); removeChar(i); }, {passive:false});
      slot.addEventListener('mousedown', () => removeChar(i));
    }
    area.appendChild(slot);
  }
}

function renderChoices() {
  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  shuffledChoices.forEach((ch, i) => {
    const btn = document.createElement('div');
    btn.className = 'choice-btn' + (usedChoices[i] ? ' used' : '');
    btn.textContent = ch;
    btn.dataset.ci = i;
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); tapChoice(ch, i, btn); }, {passive:false});
    btn.addEventListener('mousedown', () => tapChoice(ch, i, btn));
    area.appendChild(btn);
  });
}

function tapChoice(ch, ci, btn) {
  if(usedChoices[ci]) return;
  if(userInput.filter(v=>v).length >= currentWord.length) return;
  usedChoices[ci] = true;
  userInput.push(ch);
  btn.classList.add('used');
  renderSlots();
  if(userInput.length === currentWord.length) checkAnswer();
}

function removeChar(idx) {
  const removed = userInput[idx];
  userInput.splice(idx, 1);
  const choiceIdx = shuffledChoices.findIndex((c, i) => c === removed && usedChoices[i]);
  if(choiceIdx >= 0) usedChoices[choiceIdx] = false;
  renderSlots();
  renderChoices();
  document.getElementById('feedback').textContent = '';
}

function checkAnswer() {
  const answer = userInput.join('');
  const fb = document.getElementById('feedback');
  if(answer === currentWord) {
    fb.textContent = '⭕ せいかい！すごい！';
    fb.style.color = '#27ae60';
    score += 10;
    streak++;
    document.getElementById('score').textContent = score;
    document.getElementById('streak').textContent = streak;
    document.getElementById('question-area').classList.add('correct-anim');

    /* 🎆 3問連続正解ごとに花火3発！ */
    if(streak > 0 && streak % 3 === 0) {
      setTimeout(launchFireworks, 300);
    }

    setTimeout(() => {
      document.getElementById('question-area').classList.remove('correct-anim');
      nextQuestion();
    }, 1000);
  } else {
    fb.textContent = '❌ ちがうよ！もういちど！';
    fb.style.color = '#e74c3c';
    streak = 0;
    document.getElementById('streak').textContent = streak;
    setTimeout(() => {
      userInput = []; usedChoices = [];
      fb.textContent = '';
      renderSlots();
      renderChoices();
    }, 1200);
  }
}

nextQuestion();

/* =============================================
   🎆 花火エフェクト（Canvas）
   3問連続正解ごとに3発打ち上げ
============================================= */
(function() {
  const canvas = document.getElementById('fireworks-canvas');
  const ctx = canvas.getContext('2d');
  let animId = null;
  let particles = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function createBurst(x, y, color) {
    const count = 60;
    for(let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 / count) * i;
      const speed = 3 + Math.random() * 5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        alpha: 1,
        color,
        radius: 3 + Math.random() * 3,
        decay: 0.013 + Math.random() * 0.007,
        gravity: 0.12
      });
    }
  }

  const PALETTES = [
    ['#FF6B6B','#FFD93D'],
    ['#6BCB77','#4D96FF'],
    ['#FFD700','#C77DFF']
  ];

  window.launchFireworks = function() {
    if(animId) cancelAnimationFrame(animId);
    particles = [];
    const W = canvas.width, H = canvas.height;

    setTimeout(function() {
      createBurst(W * 0.25, H * 0.30, PALETTES[0][0]);
      createBurst(W * 0.25, H * 0.30, PALETTES[0][1]);
      if(!animId) loop();
    }, 0);

    setTimeout(function() {
      createBurst(W * 0.50, H * 0.20, PALETTES[1][0]);
      createBurst(W * 0.50, H * 0.20, PALETTES[1][1]);
    }, 500);

    setTimeout(function() {
      createBurst(W * 0.75, H * 0.28, PALETTES[2][0]);
      createBurst(W * 0.75, H * 0.28, PALETTES[2][1]);
    }, 1000);
  };

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(function(p) {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += p.gravity;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.alpha -= p.decay;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    particles = particles.filter(p => p.alpha > 0);
    if(particles.length > 0) {
      animId = requestAnimationFrame(loop);
    } else {
      animId = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }
})();
</script>
</body>
</html>
